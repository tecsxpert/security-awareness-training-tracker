services:

  backend:
    build: ./backend
    ports:
      - "8081:8080"
    depends_on:
      - ai-service
    environment:
      - AI_SERVICE_URL=http://ai-service:5000

  ai-service:
    build: ./ai-service
    ports:
      - "5001:5000"
    env_file:
      - ./ai-service/.env

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: security_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"